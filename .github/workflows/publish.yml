---
name: Publish

"on":
  push:
    tags:
      - "v*"

jobs:
  publish:
    permissions:
      id-token: write
    environment: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe
        id: auth
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
